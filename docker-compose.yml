version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rfm-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /home/user/files:/app/files  # 修改为您的文件目录
    environment:
      - ROOT_PATH=/app/files
      - SECRET_KEY=${SECRET_KEY}
      - USERNAME=${USERNAME:-admin}
      - PASSWORD=${PASSWORD}
      - CORS_ORIGINS=["http://localhost:3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rfm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  backend_data:
